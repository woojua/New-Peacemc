<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeaceMC Wiki - Home</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #222; font-family: sans-serif; overflow-x: hidden; }

        /* 헤더 스타일 */
        header { display: flex; align-items: center; padding: 20px; background-color: #222; position: relative; z-index: 10; }
        .menu-icon { display: flex; flex-direction: column; cursor: pointer; gap: 4px; margin-right: 15px; }
        .menu-icon div { width: 25px; height: 3px; background-color: #fff; }
        .wiki-title { color: #fff; font-weight: bold; font-size: 1.2rem; }
        .discord-btn { margin-left: auto; padding: 8px 16px; background-color: #7289da; color: white; text-decoration: none; border-radius: 5px; font-size: 0.9rem; }

        /* 사이드 메뉴 스타일 */
        .side-menu {
            position: fixed; top: 0; left: -250px; width: 250px; height: 100%;
            background-color: #222; transition: 0.4s; z-index: 100;
            padding-top: 60px; box-shadow: 2px 0 10px rgba(0,0,0,0.5);
        }
        .side-menu.active { left: 0; }
        .menu-header { color: white; padding: 0 20px 20px; font-size: 1.5rem; font-weight: bold; }
        .side-menu a {
            display: block; color: #999999; padding: 15px 20px; text-decoration: none;
            transition: 0.2s; font-size: 1.1rem;
        }
        .side-menu a:hover { background-color: #202020; }

        /* 배경 블러 처리용 */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            display: none; z-index: 50;
        }
        .overlay.active { display: block; }

        /* 메인 컨텐츠 */
        .main-content { display: flex; flex-direction: column; justify-content: center; align-items: center; height: calc(100vh - 90px); color: #fff; text-align: center; }
    </style>
</head>
<body>

    <header>
        <div class="menu-icon" onclick="toggleMenu()">
            <div></div><div></div><div></div>
        </div>
        <div class="wiki-title">PeaceMC Wiki</div>
        <a href="https://discord.gg/9DJJv5UPY8" class="discord-btn">디스코드</a>
    </header>

    <!-- 사이드 메뉴 -->
    <div class="side-menu" id="sideMenu">
        <div class="menu-header">메뉴</div>
        <a href="index.html">홈으로</a> 
        <a href="guide.html">서버 기본 설명</a>
        <a href="skill.html">스킬</a>
        <a href="cmd.html">명령어</a>
    </div>

    <!-- 배경 블러 오버레이 -->
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="main-content">
        <h1>평마서버 위키</h1>
        <p>위키는 사이드메뉴 이용하세요</p>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('sideMenu');
            const overlay = document.getElementById('overlay');
            menu.classList.toggle('active');
            overlay.classList.toggle('active');
        }
    </script>
</body>
</html>
